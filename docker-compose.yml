version: "3.9"

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: ../Dockerfile.gateway
    ports:
      - "18789:18789"
    volumes:
      - mirai-config:/root/.openclaw
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  flask:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      - LLM_BASE_URL=http://gateway:18789/v1
      - MIRAI_GATEWAY_URL=http://gateway:18789
      - SEARXNG_URL=http://searxng:8888
      - FLASK_DEBUG=false
    volumes:
      - mirai-data:/app/Mirai/subconscious/swarm/data
      - mirai-config:/root/.openclaw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  searxng:
    image: searxng/searxng
    ports:
      - "8888:8888"
    restart: unless-stopped

  # Optional: Ollama for free local models (requires GPU)
  # Uncomment to enable tier-3 local models
  # ollama:
  #   image: ollama/ollama
  #   ports:
  #     - "11434:11434"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - capabilities: [gpu]
  #   volumes:
  #     - ollama-models:/root/.ollama

volumes:
  mirai-config:
  mirai-data:
  # ollama-models:
