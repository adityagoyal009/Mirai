<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Solo | Claude Opus 4.6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Vision Solo</h1>
            <p>Standalone Image Analysis powered by <span>Claude Opus 4.6</span></p>
        </header>

        <main>
            <div class="upload-section">
                <div id="drop-zone" class="drop-zone">
                    <p>Drop image here or click to upload</p>
                    <input type="file" id="file-input" accept="image/*" hidden>
                    <img id="preview" class="hidden" alt="Preview">
                </div>

                <div class="input-group">
                    <label for="prompt">Analysis Prompt</label>
                    <textarea id="prompt" placeholder="Describe the image, extract text, or ask a question..."></textarea>
                </div>

                <button id="analyze-btn" disabled>Analyze Image</button>
            </div>

            <div id="result-section" class="result-section hidden">
                <h2>Analysis Result</h2>
                <div id="loader" class="loader hidden"></div>
                <div id="analysis-text"></div>
            </div>
        </main>

        <footer>
            <p>Authenticated via Claude Code OAuth Token</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
